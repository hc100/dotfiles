name: Pinact update

on:
  schedule:
    - cron: "0 19 * * 2"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pinact-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Update pinned actions
        run: nix run --inputs-from . nixpkgs#pinact -- run --update --min-age 7
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Verify pinned actions
        run: nix run --inputs-from . nixpkgs#pinact -- run --check
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Create pinact update PR
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: codex/pinact-update
        run: |
          set -euo pipefail

          if git diff --quiet -- .github/workflows; then
            echo "GitHub Actions are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH_NAME"
          git add .github/workflows
          git commit -m "Update pinned GitHub Actions"
          git push --force-with-lease origin "$BRANCH_NAME"

          body="$(cat <<'BODY'
          Automated GitHub Actions pin update.

          Validation:
          - `pinact run --update --min-age 7`
          - `pinact run --check`
          BODY
          )"

          if gh pr view "$BRANCH_NAME" >/dev/null 2>&1; then
            gh pr edit "$BRANCH_NAME" \
              --title "Update pinned GitHub Actions" \
              --body "$body"
          else
            gh pr create \
              --base main \
              --head "$BRANCH_NAME" \
              --title "Update pinned GitHub Actions" \
              --body "$body"
          fi
